; =============================================================
; ArgentinaCraft — PHP Configuration
; Optimizado para PocketMine-MP en hosting gratuito
; =============================================================

; Memoria (ajustar según hosting)
memory_limit=512M

; PocketMine requiere esto
phar.readonly=0

; Timezone Argentina
date.timezone=America/Argentina/Buenos_Aires

; OPcache (mejora performance significativamente)
[opcache]
opcache.enable=1
opcache.memory_consumption=128
opcache.interned_strings_buffer=8
opcache.max_accelerated_files=4000
opcache.revalidate_freq=60
opcache.fast_shutdown=1
opcache.save_comments=1
opcache.jit=1255
opcache.jit_buffer_size=64M

; Deshabilitar en producción para performance
zend.assertions=-1

; Configuración de errores (deshabilitar en producción)
display_errors=0
log_errors=1
error_log=./logs/php_errors.log

; Extensiones necesarias
extension=mbstring
extension=curl
extension=zip
extension=gmp
extension=xml
